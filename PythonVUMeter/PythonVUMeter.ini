[Rainmeter]
Update=16
Author=Python VU Meter
Name=Python VU Meter LED

[Metadata]
Name=Python VU Meter LED Style
Description=VU Meter que lee datos de la aplicación Python
License=MIT
Version=1.0

; ============================================
; VARIABLES
; ============================================
[Variables]
; Colores
ColorGreen=0,200,0,255
ColorYellow=255,200,0,255
ColorRed=255,50,50,255
ColorOff=30,30,30,255
ColorBackground=20,20,25,240

; Dimensiones
BarWidth=20
BarHeight=250
LedCount=20
LedSize=10
LedSpacing=2

; Archivo de datos generado por Python
DataFile=audio_levels.json

; ============================================
; MEDIDAS - Leer datos del JSON
; ============================================
[MeasureJSON]
Measure=WebParser
URL=file:///#@#Variables/#DataFile#
RegExp="left":\s*([0-9.]+).*"right":\s*([0-9.]+).*"left_peak":\s*([0-9.]+).*"right_peak":\s*([0-9.]+)
DecodeCharacterReference=1
LogSubstringErrors=0
UpdateRate=60

[MeasureLeft]
Measure=WebParser
URL=[MeasureJSON]
StringIndex=1

[MeasureRight]
Measure=WebParser
URL=[MeasureJSON]
StringIndex=2

[MeasureLeftPeak]
Measure=WebParser
URL=[MeasureJSON]
StringIndex=3

[MeasureRightPeak]
Measure=WebParser
URL=[MeasureJSON]
StringIndex=4

; Alternativa: Leer del archivo .inc
[MeasureLeftDirect]
Measure=Calc
Formula=AudioLeft
DynamicVariables=1

; ============================================
; METERS - Visualización LED
; ============================================
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,180,310,10 | Fill Color #ColorBackground# | Stroke Color 60,60,70,100,1

; Título
[MeterTitle]
Meter=String
X=90
Y=15
StringAlign=Center
FontColor=100,100,120,255
FontSize=10
FontWeight=600
Text="VU METER"

; Canal Izquierdo - Etiqueta
[MeterLabelL]
Meter=String
X=35
Y=35
StringAlign=Center
FontColor=150,150,150,255
FontSize=12
FontWeight=700
Text="L"

; Canal Izquierdo - Barra
[MeterBarL]
Meter=Bar
X=20
Y=55
W=#BarWidth#
H=#BarHeight#
BarColor=#ColorGreen#
SolidColor=#ColorOff#
BarOrientation=Vertical
MeasureName=MeasureLeft
Value=1

; Peak izquierdo
[MeterPeakL]
Meter=Bar
X=20
Y=55
W=#BarWidth#
H=#BarHeight#
BarColor=#ColorYellow#
SolidColor=0,0,0,0
BarOrientation=Vertical
MeasureName=MeasureLeftPeak
Value=1

; Canal Derecho - Etiqueta
[MeterLabelR]
Meter=String
X=145
Y=35
StringAlign=Center
FontColor=150,150,150,255
FontSize=12
FontWeight=700
Text="R"

; Canal Derecho - Barra
[MeterBarR]
Meter=Bar
X=130
Y=55
W=#BarWidth#
H=#BarHeight#
BarColor=#ColorGreen#
SolidColor=#ColorOff#
BarOrientation=Vertical
MeasureName=MeasureRight
Value=1

; Peak derecho
[MeterPeakR]
Meter=Bar
X=130
Y=55
W=#BarWidth#
H=#BarHeight#
BarColor=#ColorYellow#
SolidColor=0,0,0,0
BarOrientation=Vertical
MeasureName=MeasureRightPeak
Value=1

; Valor dB
[MeterDB]
Meter=String
X=90
Y=300
StringAlign=Center
FontColor=100,100,100,255
FontSize=9
FontFace=Consolas
Text="Python VU"
