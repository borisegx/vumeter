[Rainmeter]
Update=16
Author=Python VU Meter
Name=Python VU Meter LED Style

[Metadata]
Name=Python VU Meter LED Style
Description=VU Meter que lee datos de la aplicación Python. Muestra niveles de audio del sistema con LEDs.
License=MIT
Version=1.0
Instructions=1. Ejecuta la aplicación Python VU Meter\n2. Este skin leerá automáticamente los datos

; ============================================
; VARIABLES
; ============================================
[Variables]
; Colores de los LEDs
ColorGreen=0,220,0,255
ColorYellow=255,220,0,255
ColorRed=255,50,50,255
ColorOff=25,25,30,255
ColorBackground=15,15,20,245
ColorBorder=50,50,60,150

; Dimensiones
BarWidth=22
BarHeight=220

; Archivo de datos generado por Python
; Este archivo se actualiza en tiempo real
DataFile=audio_levels.json

; ============================================
; MEDIDAS - Leer datos del JSON
; ============================================
[MeasureJSON]
Measure=WebParser
URL=file:///#@##DataFile#
RegExp="left":\s*([0-9.]+).*"right":\s*([0-9.]+).*"left_peak":\s*([0-9.]+).*"right_peak":\s*([0-9.]+)
DecodeCharacterReference=1
LogSubstringErrors=0
UpdateRate=60
Debug=0

[MeasureLeft]
Measure=WebParser
URL=[MeasureJSON]
StringIndex=1

[MeasureRight]
Measure=WebParser
URL=[MeasureJSON]
StringIndex=2

[MeasureLeftPeak]
Measure=WebParser
URL=[MeasureJSON]
StringIndex=3

[MeasureRightPeak]
Measure=WebParser
URL=[MeasureJSON]
StringIndex=4

; ============================================
; METERS - Visualización LED Estilo
; ============================================

; Fondo principal con sombra
[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,170,310,12 | Fill Color #ColorBackground# | Stroke Color #ColorBorder#,1

; Título con estilo
[MeterTitle]
Meter=String
X=85
Y=12
StringAlign=Center
FontColor=100,100,130,255
FontSize=10
FontWeight=600
FontFace=Segoe UI
Text="VU METER"

; Línea decorativa
[MeterLine]
Meter=Shape
Shape=Line 30,32,140,32 | Stroke Color 50,50,70,100,1

; ============================================
; CANAL IZQUIERDO
; ============================================

; Etiqueta L
[MeterLabelL]
Meter=String
X=32
Y=38
StringAlign=Center
FontColor=180,180,180,255
FontSize=14
FontWeight=700
FontFace=Segoe UI
Text="L"

; Fondo de la barra izquierda
[MeterBarBgL]
Meter=Shape
Shape=Rectangle 0,0,#BarWidth#,#BarHeight#,4 | Fill Color 20,20,25,255 | Stroke Color 40,40,45,200,1
X=20
Y=60

; Barra de nivel izquierdo
[MeterBarL]
Meter=Bar
X=21
Y=61
W=#BarWidth#
H=#BarHeight#
BarColor=0,200,0,255
SolidColor=0,0,0,0
BarOrientation=Vertical
MeasureName=MeasureLeft
Value=1

; Peak izquierdo (indicador superior)
[MeterPeakIndicatorL]
Meter=Shape
Shape=Rectangle 0,0,#BarWidth#,3,1 | Fill Color 255,255,255,230
X=20
Y=60

; Valor numérico izquierdo
[MeterValueL]
Meter=String
X=32
Y=285
StringAlign=Center
FontColor=120,120,120,255
FontSize=9
FontFace=Consolas
MeasureName=MeasureLeft
NumOfDecimals=2
Text="%1"

; ============================================
; CANAL DERECHO
; ============================================

; Etiqueta R
[MeterLabelR]
Meter=String
X=138
Y=38
StringAlign=Center
FontColor=180,180,180,255
FontSize=14
FontWeight=700
FontFace=Segoe UI
Text="R"

; Fondo de la barra derecha
[MeterBarBgR]
Meter=Shape
Shape=Rectangle 0,0,#BarWidth#,#BarHeight#,4 | Fill Color 20,20,25,255 | Stroke Color 40,40,45,200,1
X=126
Y=60

; Barra de nivel derecho
[MeterBarR]
Meter=Bar
X=127
Y=61
W=#BarWidth#
H=#BarHeight#
BarColor=0,200,0,255
SolidColor=0,0,0,0
BarOrientation=Vertical
MeasureName=MeasureRight
Value=1

; Peak derecho (indicador superior)
[MeterPeakIndicatorR]
Meter=Shape
Shape=Rectangle 0,0,#BarWidth#,3,1 | Fill Color 255,255,255,230
X=126
Y=60

; Valor numérico derecho
[MeterValueR]
Meter=String
X=138
Y=285
StringAlign=Center
FontColor=120,120,120,255
FontSize=9
FontFace=Consolas
MeasureName=MeasureRight
NumOfDecimals=2
Text="%1"

; ============================================
; ESCALA dB
; ============================================

[MeterScale0]
Meter=String
X=75
Y=60
FontColor=80,80,80,200
FontSize=7
FontFace=Consolas
Text="0"

[MeterScale3]
Meter=String
X=75
Y=90
FontColor=80,80,80,200
FontSize=7
FontFace=Consolas
Text="-3"

[MeterScale12]
Meter=String
X=75
Y=140
FontColor=80,80,80,200
FontSize=7
FontFace=Consolas
Text="-12"

[MeterScale24]
Meter=String
X=75
Y=190
FontColor=80,80,80,200
FontSize=7
FontFace=Consolas
Text="-24"

[MeterScaleInf]
Meter=String
X=75
Y=260
FontColor=80,80,80,200
FontSize=7
FontFace=Consolas
Text="-∞"

; ============================================
; INFORMACIÓN
; ============================================

[MeterInfo]
Meter=String
X=85
Y=300
StringAlign=Center
FontColor=70,70,70,200
FontSize=7
FontFace=Segoe UI
Text="Python VU Meter"
